{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>bitbox membership check </title>
    <style>
        #fform,#aform
        {
            display: table;
            margin: 0 auto;
        }
        h1{text-align:center;}
        h3{text-align: center;color: brown;}
.form-container {
    max-width: 350px;
    margin: 60px auto;
    text-align: center;
    font-family: Arial;
}

input {
    width: 100%;
    padding: 12px;
    border: 2px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
}

input:focus {
    border-color: #28a745;
}

#error-msg {
    color: red;
    font-size: 13px;
    display: block;
    margin-top: 5px;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: #28a745;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

    </style>

    <script>

        function validateForm() {
            var x = document.aform.anum1.value;
            var y = document.aform.anum2.value;
            var z = document.aform.anum3.value;
            if (x == "" ||  y == "" || z == "" ) {
                alert("Name must be filled out");
                return false;
            }
        }

        function check () {

            var x=document.aform.anum3.value.length;

            if(x<=4 )
            {
                return true;
            }
            else
            {
                var str3 = document.aform.anum3.value;
                str3 = str3.substring(0, str3.length - 1);
                document.aform.anum3.value = str3;


            }
        }
        function check2 () {

            var y=document.aform.anum2.value.length;
            if(y<=2 )
            {
                return true;
            }
            else
            {
                var str2 = document.aform.anum2.value;
                str2 = str2.substring(0, str2.length - 1);
                document.aform.anum2.value = str2;


            }
        }

        function check1 () {

            var y=document.aform.anum1.value.length;
            if(y<=2 )
            {
                return true;
            }
            else
            {
                var str1 = document.aform.anum1.value;
                str1 = str1.substring(0, str1.length - 1);
                document.aform.anum1.value = str1;


            }
        }

        function dayvalidate(a,b,c)
        {
            if(a < b || isNaN(a))
                return 0;
            else if(a > c)
                return 31;
            else return a;
        }
        function monthvalidate(a,b,c)
        {
            if(a < b || isNaN(a))
                return 0;
            else if(a > c)
                return 12;
            else return a;
        }
        function yearvalidate(a,b,c)
        {
            if(a < b || isNaN(a))
                return 0;
            else if(a > c)
                return 2021;
            else return a;
        }

       function phonevalidate(a,b,c)
        {
            if(a < b || isNaN(a))
                return 0;
            else if(a > c)
                return 1999999999;
            else return a;
        }

        function  age() {
            var today = new Date();
            var dd = today.getDate();
            var mm = today.getMonth()+1;
            var yyyy = today.getFullYear();
            today = dd + mm * 30 + yyyy*12*30;


            var dobdd=parseInt(document.aform.anum1.value);
            var dobmm=parseInt(document.aform.anum2.value);
            var dobyy=parseInt(document.aform.anum3.value);
            var btd = dobdd + dobmm * 30 + dobyy*12*30;

           var resulttotaldays=today-btd;
            var resdd=resulttotaldays%30;
            var emm= parseInt(resulttotaldays/30);
            var resmm=emm%12;
            var resyy=parseInt(emm/12);
            document.getElementById("show1").innerHTML=resdd+" Days";
            document.getElementById("show2").innerHTML=resmm+" Month";
            document.getElementById("show3").innerHTML=resyy+" Year ";
       }

const phone = document.getElementById("phone");
const error = document.getElementById("error-msg");

// typing এর সময় validation
phone.addEventListener("input", function () {
    // শুধু সংখ্যা allow
    this.value = this.value.replace(/[^0-9]/g, '');

    if (this.value.length === 11) {
        error.textContent = "";
    } else {
        error.textContent = "মোবাইল নাম্বার অবশ্যই ১১ সংখ্যা হতে হবে";
    }
});

// submit এর সময় check
document.querySelector("form").addEventListener("submit", function(e) {
    if (phone.value.length !== 11) {
        e.preventDefault();
        error.textContent = "মোবাইল নাম্বার অবশ্যই ১১ সংখ্যা হতে হবে";
        phone.focus();
    }
});
    </script>



</head>
<body style="align-self: center">


  



<center>  
<img width="300px" height="70px" src="{%static 'logo.png'%}" alt="image is missing"> 
<h3>Enter your mobile no for membership check</h3>
</center>  
<br>

<form action="{% url 'search' %}" method="POST" class="form-container">
    {% csrf_token %}
    <div class="input-group">
        <input 
            type="text" 
            name="searched" 
            id="phone"
            placeholder="মোবাইল নাম্বার লিখুন (১১ সংখ্যা)"
            maxlength="11"
            required
        >
        <span id="error-msg"></span>
    </div>

    <button type="submit">Check</button>
</form>

{% block content%}
{% endblock %}
